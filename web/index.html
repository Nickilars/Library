<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#1a110a">
  <title>Ma bibliothèque</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./shelf.css">
</head>
<body>
  <header class="entete">
    <h1>📚 Ma bibliothèque</h1>
    <div class="controles" id="controles" hidden>
      <input id="recherche" type="search" placeholder="Rechercher titre, auteur, saga…">
      <div class="filtres">
        <button class="chip actif" data-statut="">Tous</button>
        <button class="chip" data-statut="non_lu">À lire</button>
        <button class="chip" data-statut="en_cours">En cours</button>
        <button class="chip" data-statut="lu">Lu</button>
      </div>
      <button id="btn-ajouter">➕ Ajouter</button>
      <button id="btn-deconnexion">Déconnexion</button>
    </div>
  </header>

  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne" hidden></div>

  <div id="barre-focus" class="barre-focus">
    <button id="btn-retour">← Retour</button>
    <span id="focus-nom"></span>
  </div>

  <main id="contenu">
    <form id="login" class="login">
      <h2>Connexion</h2>
      <input id="email" type="email" placeholder="Email" autocomplete="username" required>
      <input id="motdepasse" type="password" placeholder="Mot de passe" autocomplete="current-password" required>
      <button type="submit">Se connecter</button>
      <p id="login-erreur" class="login-erreur" hidden></p>
    </form>
    <div id="etagere" hidden></div>
  </main>

  <div id="modale-edition" class="modale cache">
    <form id="form-edition" class="form-edition">
      <h2 id="form-titre-modale">Ajouter un livre</h2>
      <input id="f-titre" placeholder="Titre *" required>
      <input id="f-auteur" placeholder="Auteur *" required>
      <input id="f-annee" placeholder="Année">
      <input id="f-isbn" placeholder="ISBN (13 chiffres)">
      <input id="f-saga" placeholder="Saga">
      <input id="f-tome" type="number" min="0" placeholder="Tome">
      <select id="f-statut">
        <option value="non_lu">À lire</option>
        <option value="en_cours">En cours</option>
        <option value="lu">Lu</option>
      </select>
      <label><input id="f-possede" type="checkbox"> Possédé</label>
      <label><input id="f-wishlist" type="checkbox"> Wishlist</label>
      <input id="f-note" type="number" min="0" max="5" placeholder="Note (0–5)">
      <textarea id="f-commentaire" placeholder="Commentaire"></textarea>
      <p id="form-erreur" class="form-erreur" hidden></p>
      <div class="form-actions">
        <button type="submit">Enregistrer</button>
        <button type="button" id="btn-supprimer" class="btn-supprimer" hidden>🗑️ Supprimer</button>
        <button type="button" id="btn-annuler">Annuler</button>
      </div>
    </form>
  </div>

  <div id="livre-ouvert" class="livre-ouvert cache"></div>

  <script src="./config.js"></script>
  <script src="./vendor/supabase.js"></script>
  <script src="./shelf.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
