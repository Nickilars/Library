<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#1a110a">
  <title>Ma bibliothèque</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./shelf.css">
</head>
<body>
  <header class="entete">
    <h1>📚 Ma bibliothèque</h1>
    <div class="controles" id="controles" hidden>
      <input id="recherche" type="search" placeholder="Rechercher titre, auteur, saga…">
      <div class="filtres">
        <button class="chip actif" data-statut="">Tous</button>
        <button class="chip" data-statut="non_lu">À lire</button>
        <button class="chip" data-statut="en_cours">En cours</button>
        <button class="chip" data-statut="lu">Lu</button>
      </div>
      <button id="btn-ajouter">➕ Ajouter</button>
      <button id="btn-scan-pile" hidden>📷 Scanner une pile</button>
      <button id="btn-deconnexion">Déconnexion</button>
    </div>
  </header>

  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne" hidden></div>

  <div id="barre-focus" class="barre-focus">
    <button id="btn-retour">← Retour</button>
    <span id="focus-nom"></span>
  </div>

  <main id="contenu">
    <form id="login" class="login">
      <h2>Connexion</h2>
      <input id="email" type="email" placeholder="Email" autocomplete="username" required>
      <input id="motdepasse" type="password" placeholder="Mot de passe" autocomplete="current-password" required>
      <button type="submit">Se connecter</button>
      <p id="login-erreur" class="login-erreur" hidden></p>
    </form>
    <div id="etagere" hidden></div>
  </main>

  <div id="modale-edition" class="modale cache">
    <form id="form-edition" class="form-edition">
      <header class="form-entete">
        <h2 id="form-titre-modale">Ajouter un livre</h2>
        <button type="button" id="btn-fermer-modale" class="btn-fermer" title="Fermer (Échap)">✕</button>
      </header>

      <div class="form-corps">
        <section class="bloc-isbn">
          <label for="f-isbn">ISBN <span class="indice">— scanne ou saisis pour pré-remplir</span></label>
          <div class="ligne-isbn">
            <input id="f-isbn" inputmode="numeric" autocomplete="off" placeholder="13 chiffres">
            <button type="button" id="btn-isbn" class="btn-isbn" title="Rechercher les infos du livre">🔍<span class="btn-texte"> Rechercher</span></button>
            <button type="button" id="btn-scan" class="btn-isbn" title="Scanner le code-barres" hidden>📷<span class="btn-texte"> Scanner</span></button>
          </div>
          <p id="isbn-statut" class="isbn-statut"></p>
        </section>

        <div class="champ">
          <label for="f-titre">Titre <span class="requis">*</span></label>
          <input id="f-titre" required autocomplete="off">
        </div>
        <div class="champ">
          <label for="f-auteur">Auteur <span class="requis">*</span></label>
          <input id="f-auteur" required autocomplete="off">
        </div>

        <div class="rangee-champs">
          <div class="champ">
            <label for="f-saga">Saga</label>
            <input id="f-saga" autocomplete="off">
          </div>
          <div class="champ petit">
            <label for="f-tome">Tome</label>
            <input id="f-tome" type="number" min="0" inputmode="numeric">
          </div>
        </div>

        <div class="rangee-champs">
          <div class="champ">
            <label for="f-statut">Statut de lecture</label>
            <select id="f-statut">
              <option value="non_lu">À lire</option>
              <option value="en_cours">En cours</option>
              <option value="lu">Lu</option>
            </select>
          </div>
          <div class="champ petit">
            <label for="f-annee">Année</label>
            <input id="f-annee" inputmode="numeric" autocomplete="off">
          </div>
        </div>

        <div class="rangee-champs">
          <div class="champ petit">
            <label for="f-note">Note (0–5)</label>
            <input id="f-note" type="number" min="0" max="5" inputmode="numeric">
          </div>
          <div class="champ cases">
            <label class="case"><input id="f-possede" type="checkbox"> Possédé</label>
            <label class="case"><input id="f-wishlist" type="checkbox"> Wishlist</label>
          </div>
        </div>

        <div class="champ">
          <label for="f-commentaire">Commentaire</label>
          <textarea id="f-commentaire" rows="3" placeholder="Ton avis, une citation…"></textarea>
        </div>

        <p id="form-erreur" class="form-erreur" hidden></p>
      </div>

      <footer class="form-actions">
        <button type="button" id="btn-supprimer" class="btn-supprimer" hidden>🗑️ Supprimer</button>
        <span class="espace"></span>
        <button type="button" id="btn-annuler">Annuler</button>
        <button type="submit">Enregistrer</button>
      </footer>
    </form>
  </div>

  <div id="livre-ouvert" class="livre-ouvert cache"></div>

  <script src="./config.js"></script>
  <script src="./vendor/supabase.js"></script>
  <script src="./shelf.js"></script>
  <script src="./isbn.js"></script>
  <script type="module" src="./scan.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
